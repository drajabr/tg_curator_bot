services:
  tg-curator-bot:
    image: ${IMAGE_NAME:-ghcr.io/drajabr/tg_curator_bot:latest}
    pull_policy: always
    container_name: tg-curator-bot
    restart: unless-stopped
    stdin_open: true
    tty: true
    env_file:
      - .env
    mem_limit: ${CONTAINER_MEMORY_LIMIT:-512m}
    memswap_limit: ${CONTAINER_MEMORY_SWAP_LIMIT:-512m}
    volumes:
      - ./data:/app/data
